<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plan B 15/10">
<meta name="theme-color" content="#0f1923">
<title>Plan B 15/10 — Cammino Balteo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#0f1923;--surface:#162030;--surface2:#1c2d40;--border:#243548;
  --text:#d0dbe8;--muted:#6b8099;--white:#fff;--blue:#2979ff;
  --green:#43a047;--orange:#f57c00;--purple:#7b1fa2;--red:#e53935;
  --teal:#00838f;--gold:#f9a825;--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Segoe UI',system-ui,Arial,sans-serif;color:var(--text);font-size:15px;line-height:1.6;}
a{color:#90caf9;text-decoration:none;}a:hover{text-decoration:underline;}

/* LANG TOGGLE */
#lang-btn{position:fixed;top:12px;right:16px;z-index:10000;display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:4px 6px;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.lang-opt{padding:5px 12px;border-radius:24px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s;letter-spacing:.5px;user-select:none;}
.lang-opt.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(41,121,255,.4);}

/* SYNC BAR */
#sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);padding-right:140px;}
#sync-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s;}
#sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
#sync-dot.saving{background:var(--orange);}

/* HERO */
.hero{background:linear-gradient(160deg,#0a1520 0%,#142a4a 55%,#0a2010 100%);padding:32px 20px 22px;text-align:center;border-bottom:1px solid var(--border);}
.hero-flags{font-size:26px;letter-spacing:8px;margin-bottom:10px;}
.hero h1{font-size:34px;color:var(--white);letter-spacing:5px;font-weight:900;}
.hero-tagline{color:#90b8e0;font-size:13px;margin-top:6px;}
.hero-date{display:inline-block;background:var(--blue);color:#fff;font-size:13px;font-weight:700;padding:6px 20px;border-radius:30px;margin-top:12px;}
.countdown{display:flex;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap;}
.cd-unit{display:flex;flex-direction:column;align-items:center;min-width:64px;}
.cd-val{font-size:32px;font-weight:900;color:var(--white);line-height:1;font-variant-numeric:tabular-nums;}
.cd-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.cd-sep{font-size:28px;font-weight:900;color:var(--border);line-height:1;padding-top:4px;}
.cd-title{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;text-transform:uppercase;letter-spacing:2px;}

/* PROGRESS */
.gp-wrap{background:var(--surface);padding:12px 20px;border-bottom:1px solid var(--border);}
.gp-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.gp-label{font-size:12px;color:var(--muted);white-space:nowrap;}
.gp-bar-bg{flex:1;background:var(--bg);border-radius:10px;height:8px;overflow:hidden;}
.gp-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:10px;transition:width .5s;}
#gp-pct{font-size:13px;font-weight:700;color:var(--white);white-space:nowrap;}

.container{max-width:960px;margin:0 auto;padding:24px 20px;}

/* SECTION HEADER */
.sec-head{margin:36px 0 16px;display:flex;align-items:center;gap:14px;}
.sec-head h2{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-sub{font-size:13px;color:var(--muted);margin:-8px 0 16px;}
.sec-sub strong{color:#ef9a9a;}

/* LEAFLET */
#trek-map{width:100%;height:360px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;z-index:1;}
.leaflet-container{background:#0f1923;}
.leaflet-popup-content-wrapper{background:#08141f;border:1px solid var(--border);color:var(--text);border-radius:10px;}
.leaflet-popup-tip{background:#08141f;}
.leaflet-popup-content{margin:12px 14px;font-size:13px;}
.pop-title{font-weight:700;color:#90caf9;font-size:14px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.pop-row{color:#90a4ae;line-height:2;}
.pop-row b{color:var(--white);}
.pop-note{margin-top:6px;color:#64b5f6;font-size:12px;line-height:1.5;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px;}
.stat{background:var(--surface);border-radius:12px;padding:16px 12px;text-align:center;border:1px solid var(--border);}
.stat-val{font-size:22px;font-weight:800;color:var(--white);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

/* PARTICIPANTS */
.participants-wrap{display:flex;flex-direction:column;gap:14px;}
.participants-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.part-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px 14px;display:flex;flex-direction:column;gap:8px;position:relative;}
.part-num{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.part-field{display:flex;flex-direction:column;gap:3px;}
.part-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.part-input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--white);font-family:inherit;outline:none;width:100%;}
.part-input:focus{border-color:var(--blue);}
.part-input.name-big{font-size:14px;font-weight:700;border:none;background:transparent;padding:0;color:#90caf9;}
.part-input.name-big:focus{border-bottom:1px dashed var(--blue);border-radius:0;}
.part-input.name-big::placeholder{color:var(--muted);font-weight:400;font-size:13px;}
.part-del{position:absolute;top:10px;right:10px;font-size:16px;color:var(--border);cursor:pointer;opacity:0;transition:opacity .2s,color .2s;}
.part-card:hover .part-del{opacity:1;}
.part-del:hover{color:#ef5350;}
.add-part-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:14px;cursor:pointer;color:var(--muted);font-size:13px;transition:all .2s;width:100%;}
.add-part-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(41,121,255,.05);}

/* ROLES */
.roles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.role-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;}
.role-top{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.role-hrow{display:flex;align-items:flex-start;gap:12px;}
.role-icon{font-size:24px;flex-shrink:0;margin-top:2px;}
.role-info{flex:1;min-width:0;}
.role-title{color:var(--white);font-weight:700;font-size:15px;}
.name-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.name-input{font-size:13px;color:#90caf9;font-weight:600;border:none;background:transparent;outline:none;font-family:inherit;width:100%;cursor:pointer;}
.name-input:focus{color:var(--white);border-bottom:1px dashed var(--blue);cursor:text;}
.role-prog{padding:10px 20px 0;}
.rprog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rprog-bg{flex:1;background:var(--bg);border-radius:8px;height:5px;overflow:hidden;}
.rprog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:8px;transition:width .4s;}
.rprog-txt{font-size:11px;color:var(--muted);white-space:nowrap;}

/* TASKS */
.tasks-body{padding:4px 20px 14px;flex:1;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(36,53,72,.5);}
.task-row:last-of-type{border-bottom:none;}
.cb{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;}
.cb.on{background:var(--blue);border-color:var(--blue);}
.cb.on::after{content:'✓';font-size:11px;color:#fff;font-weight:700;}
.task-lbl{font-size:13px;color:var(--text);line-height:1.5;flex:1;cursor:pointer;}
.task-lbl.done{text-decoration:line-through;color:var(--muted);}
.task-del{font-size:18px;color:var(--border);cursor:pointer;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s;}
.task-row:hover .task-del{opacity:1;}
.task-del:hover{color:#ef5350;}
.add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;font-family:inherit;}
.add-input:focus{border-color:var(--blue);}
.add-btn{background:var(--blue);border:none;border-radius:8px;color:#fff;font-size:20px;width:36px;cursor:pointer;transition:background .2s;}
.add-btn:hover{background:#448aff;}

/* TRANSPORT CITIES */
.transport-cities{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);}
.city-card{background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);}
.city-from{font-size:13px;font-weight:700;color:var(--white);margin-bottom:3px;}
.city-detail{font-size:12px;color:var(--muted);line-height:1.5;}
.city-price{font-size:12px;color:#80cbc4;font-weight:700;margin-top:4px;}

/* MEDIA BADGE */
.media-badge{display:inline-block;background:rgba(213,0,0,.15);border:1px solid rgba(213,0,0,.3);border-radius:6px;padding:3px 8px;font-size:10px;color:#ef9a9a;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:6px;}
.media-section-tag{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 20px 4px;border-top:1px solid var(--border);font-weight:700;}

/* COMMENTS */
.comments-section{border-top:1px solid var(--border);}
.comments-toggle{display:flex;align-items:center;gap:8px;padding:10px 20px;cursor:pointer;font-size:12px;color:var(--muted);user-select:none;transition:color .2s;}
.comments-toggle:hover{color:var(--text);}
.comments-toggle-arrow{transition:transform .2s;font-size:10px;}
.comments-toggle-arrow.open{transform:rotate(90deg);}
.comments-inner{display:none;padding:0 20px 14px;}
.comments-inner.open{display:block;}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.comment-item{background:var(--surface2);border-radius:8px;padding:9px 11px;border:1px solid var(--border);}
.comment-meta{display:flex;gap:8px;margin-bottom:3px;}
.comment-author{font-size:12px;font-weight:700;color:#90caf9;}
.comment-time{font-size:11px;color:var(--muted);}
.comment-text{font-size:13px;color:var(--text);}
.comment-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px;font-style:italic;}
.comment-form{display:flex;gap:6px;}
.comment-author-input{width:90px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:12px;color:var(--white);font-family:inherit;outline:none;flex-shrink:0;}
.comment-author-input:focus{border-color:var(--blue);}
.comment-msg-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--white);font-family:inherit;outline:none;}
.comment-msg-input:focus{border-color:var(--blue);}
.comment-send-btn{background:var(--blue);border:none;border-radius:7px;color:#fff;font-size:16px;width:34px;cursor:pointer;flex-shrink:0;}
.comment-send-btn:hover{background:#448aff;}

/* EXPENSES */
.expense-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.exp-form-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;}
.exp-form-box h3{font-size:13px;font-weight:700;color:var(--white);margin-bottom:14px;}
.exp-field{margin-bottom:10px;}
.exp-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.exp-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--white);font-family:inherit;outline:none;}
.exp-input:focus{border-color:var(--blue);}
.exp-checkboxes{display:flex;flex-wrap:wrap;gap:7px;}
.exp-cb-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text);cursor:pointer;}
.exp-cb-row input{accent-color:var(--blue);}
.exp-submit{background:var(--blue);border:none;border-radius:8px;color:#fff;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.exp-submit:hover{background:#448aff;}
.exp-list-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;}
.exp-list-head{padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--white);}
.exp-list{flex:1;overflow-y:auto;max-height:300px;}
.exp-item{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid rgba(36,53,72,.5);}
.exp-item:last-child{border-bottom:none;}
.exp-amt{font-size:15px;font-weight:800;color:var(--white);white-space:nowrap;}
.exp-info{flex:1;min-width:0;}
.exp-desc-txt{font-size:13px;color:var(--text);font-weight:600;}
.exp-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.exp-del{font-size:17px;color:var(--border);cursor:pointer;opacity:0;transition:opacity .2s,color .2s;}
.exp-item:hover .exp-del{opacity:1;}
.exp-del:hover{color:#ef5350;}
.exp-empty{text-align:center;font-size:13px;color:var(--muted);padding:28px;font-style:italic;}
.exp-balance-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-top:14px;}
.exp-balance-box h3{font-size:13px;font-weight:700;color:var(--white);margin-bottom:12px;}
.exp-balance-grid{display:flex;flex-wrap:wrap;gap:10px;}
.exp-bal-item{background:var(--surface2);border-radius:10px;padding:10px 14px;text-align:center;border:1px solid var(--border);min-width:100px;}
.exp-bal-name{font-size:11px;color:var(--muted);margin-bottom:3px;}
.exp-bal-val{font-size:15px;font-weight:800;}
.exp-bal-val.pos{color:#66bb6a;}
.exp-bal-val.neg{color:#ef5350;}
.exp-bal-val.zero{color:var(--muted);}
.exp-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;border-top:1px solid var(--border);margin-top:12px;}
.exp-total-lbl{font-size:13px;color:var(--muted);}
.exp-total-val{font-size:18px;font-weight:800;color:var(--white);}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.info-card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border);}
.info-card h4{color:var(--white);font-size:14px;font-weight:700;margin-bottom:12px;}
.info-card li{font-size:13px;color:var(--muted);line-height:1.9;list-style:none;padding-left:14px;position:relative;}
.info-card li::before{content:'›';position:absolute;left:0;color:var(--border);}
.info-card li b{color:var(--text);}
.sos{border-left:3px solid #c62828!important;}
.sos h4{color:#ef9a9a;}

/* HUB RESSOURCES */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.hub-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:18px;transition:transform .15s,box-shadow .15s;}
.hub-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.hub-icon{font-size:22px;margin-bottom:10px;}
.hub-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:10px;}
.hub-links{display:flex;flex-direction:column;gap:6px;}
.hub-link{display:flex;align-items:center;gap:8px;font-size:12px;color:#90caf9;padding:6px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);transition:all .2s;text-decoration:none;}
.hub-link:hover{border-color:var(--blue);background:rgba(41,121,255,.08);color:#fff;}
.hub-link-icon{font-size:14px;flex-shrink:0;}
.hub-link-desc{color:var(--muted);font-size:11px;display:block;margin-top:1px;}

/* BUDGET */
.budget-box{background:var(--surface);border-radius:var(--radius);padding:22px;border:1px solid var(--border);}
.budget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.budget-item{background:var(--surface2);border-radius:10px;padding:12px 10px;text-align:center;border:1px solid var(--border);}
.budget-item span{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
.budget-item strong{font-size:15px;color:var(--white);}
.budget-item.tot{background:#0d2040;border-color:var(--blue);}
.budget-item.tot strong{color:#90caf9;font-size:18px;}
.budget-item.tot2{background:#0d2010;border-color:#2e7d32;}
.budget-item.tot2 strong{color:#a5d6a7;font-size:18px;}
.budget-note{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.7;}

footer{text-align:center;padding:24px;font-size:12px;color:var(--border);border-top:1px solid var(--surface);margin-top:8px;}

@media(max-width:760px){
  .roles-grid,.info-grid,.hub-grid,.expense-grid{grid-template-columns:1fr;}
  .stats,.budget-grid,.participants-grid{grid-template-columns:repeat(2,1fr);}
  .transport-cities{grid-template-columns:1fr;}
  .hero h1{font-size:24px;}.cd-val{font-size:24px;}
  #lang-btn{top:8px;right:8px;}
}
</style>
</head>
<body>

<div id="lang-btn">
  <div class="lang-opt active" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</div>
  <div class="lang-opt" id="btn-en" onclick="setLang('en')">🇬🇧 EN</div>
</div>

<div id="sync-bar"><div id="sync-dot"></div><span id="sync-msg"></span></div>

<div class="hero">
  <div class="hero-flags">🇧🇪 🇫🇷 🇨🇭 🇲🇦</div>
  <h1>CAMMINO BALTEO</h1>
  <p class="hero-tagline" data-t="tagline"></p>
  <div class="hero-date">15 – 23 Octobre 2026</div>
  <p class="cd-title" data-t="countdown_title"></p>
  <div class="countdown">
    <div class="cd-unit"><div class="cd-val" id="cd-days">--</div><div class="cd-lbl" data-t="countdown_days"></div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-val" id="cd-hours">--</div><div class="cd-lbl" data-t="countdown_hours"></div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-val" id="cd-mins">--</div><div class="cd-lbl" data-t="countdown_mins"></div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-val" id="cd-secs">--</div><div class="cd-lbl" data-t="countdown_secs"></div></div>
  </div>
</div>

<div class="gp-wrap">
  <div class="gp-inner">
    <span class="gp-label" data-t="org_progress"></span>
    <div class="gp-bar-bg"><div class="gp-bar" id="gp-bar" style="width:0%"></div></div>
    <span id="gp-pct">0%</span>
  </div>
</div>

<div class="container">

  <!-- MAP -->
  <div class="sec-head" style="margin-top:8px"><h2 data-t="itinerary"></h2></div>
  <p class="sec-sub" data-t="itinerary_sub"></p>
  <div id="trek-map"></div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-val">8</div><div class="stat-lbl" data-t="days"></div></div>
    <div class="stat"><div class="stat-val">~96km</div><div class="stat-lbl" data-t="distance"></div></div>
    <div class="stat"><div class="stat-val">1650m</div><div class="stat-lbl" data-t="max_alt"></div></div>
    <div class="stat"><div class="stat-val">4</div><div class="stat-lbl" data-t="adventurers"></div></div>
  </div>

  <!-- PARTICIPANTS -->
  <div class="sec-head"><h2 data-t="participants"></h2></div>
  <p class="sec-sub" data-t="participants_sub"></p>
  <div class="participants-wrap">

async function loadState(){

async function saveKey(key){
  const val=state[key]||{};
  try{
    localStorage.setItem('balteo_v5',JSON.stringify(state));
    syncDot.className='saving';setSyncMsg('sync_saving');

function initCountdown(){
  const target=new Date('2026-10-15T08:00:00');
  const tick=()=>{
    const diff=target-Date.now();
    if(diff<=0){['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id=>document.getElementById(id).textContent='00');return;}
    document.getElementById('cd-days').textContent=Math.floor(diff/86400000);
    document.getElementById('cd-hours').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-mins').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-secs').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  };
  tick();setInterval(tick,1000);
}

const DEFAULT_PARTS=[
  {name:'Elias Callaert',city:'Bruxelles',flight:'BRU→TRN 14/10',arrival:'14/10',notes:'Navigation & Sécurité'},
  {name:'Amine Bounadi',city:'',flight:'',arrival:'',notes:'Chef de Projet'},

  {name:'',city:'',flight:'',arrival:'',notes:''}
];

function getParts(){
  const ps=getS('participants');
  if(!ps.slots||!ps.slots.length){ps.slots=DEFAULT_PARTS.map(d=>({...d}));ps.count=4;}
  if(!ps.count)ps.count=ps.slots.length;
  return ps;
}

function addParticipant(){
  const ps=getParts();
  if(ps.slots.length>=8)return;
  ps.slots.push({name:'',city:'',flight:'',arrival:'',notes:''});
  ps.count=ps.slots.length;
  debounce('participants');
  renderParticipants();
  updateExpenseCheckboxes();
}

function deleteParticipant(i){
  const ps=getParts();
  if(ps.slots.length<=1)return;
  ps.slots.splice(i,1);
  ps.count=ps.slots.length;
  debounce('participants');
  renderParticipants();
  updateExpenseCheckboxes();
}

function renderParticipants(){
  const grid=document.getElementById('participants-grid');
  grid.innerHTML='';
  const ps=getParts();
  const fields=[
    {key:'name',label:t('part_name'),ph:t('ph_name'),big:true},
    {key:'city',label:t('part_city'),ph:t('ph_city')},
    {key:'flight',label:t('part_flight'),ph:t('ph_flight')},
    {key:'arrival',label:t('part_arrival'),ph:t('ph_arrival')},
    {key:'notes',label:t('part_notes'),ph:t('ph_notes')},
  ];
  ps.slots.forEach((slot,i)=>{
    const card=document.createElement('div');card.className='part-card';
    const delBtn=document.createElement('span');delBtn.className='part-del';delBtn.textContent='×';delBtn.title='Supprimer';
    delBtn.addEventListener('click',()=>deleteParticipant(i));
    card.appendChild(delBtn);
    const num=document.createElement('div');num.className='part-num';num.textContent='👤 '+(lang==='fr'?'Participant':'Participant')+' '+(i+1);
    card.appendChild(num);
    fields.forEach(f=>{
      const wrap=document.createElement('div');wrap.className='part-field';
      const lbl=document.createElement('div');lbl.className='part-label';lbl.textContent=f.label;
      const inp=document.createElement('input');
      inp.className='part-input'+(f.big?' name-big':'');
      inp.type='text';inp.placeholder=f.ph;inp.value=slot[f.key]||'';inp.maxLength=60;
      inp.addEventListener('change',()=>{getParts().slots[i][f.key]=inp.value.trim();debounce('participants');updateExpenseCheckboxes();});
      wrap.appendChild(lbl);wrap.appendChild(inp);card.appendChild(wrap);
    });
    grid.appendChild(card);
  });
  const btn=document.getElementById('add-part-btn');
  if(btn){
    btn.style.display=ps.slots.length>=8?'none':'flex';
    btn.querySelector('[data-t="add_participant"]').textContent=t('add_participant');
  }
}

function getPartNames(){
  return getParts().slots.map((s,i)=>s.name||(lang==='fr'?`Participant ${i+1}`:`Participant ${i+1}`));
}

function updateExpenseCheckboxes(){
  const box=document.getElementById('exp-shared-boxes');if(!box)return;
  const names=getPartNames();
  box.innerHTML=`<label class="exp-cb-row"><input type="checkbox" id="exp-all-cb" onchange="toggleAllExpCbs(this.checked)"/> <span>${t('exp_all')}</span></label>`+
    names.map((n,i)=>`<label class="exp-cb-row"><input type="checkbox" class="exp-part-cb" data-idx="${i}" checked/> <span>${n}</span></label>`).join('');
  document.getElementById('exp-all-cb').checked=true;
}

function toggleAllExpCbs(v){document.querySelectorAll('.exp-part-cb').forEach(cb=>cb.checked=v);}

function addExpense(){
  const who=document.getElementById('exp-who').value.trim();
  const amt=parseFloat(document.getElementById('exp-amount').value);
  const desc=document.getElementById('exp-desc').value.trim();
  if(!who||!amt||!desc)return;
  const shared=[];
  document.querySelectorAll('.exp-part-cb:checked').forEach(cb=>shared.push(getPartNames()[parseInt(cb.getAttribute('data-idx'))]));
  if(!shared.length)return;
  const es=getS('expenses');if(!es.list)es.list=[];
  es.list.push({id:Date.now(),paidBy:who,amount:amt,desc,sharedWith:shared,date:new Date().toLocaleDateString(lang==='fr'?'fr-BE':'en-GB',{day:'2-digit',month:'2-digit'})});
  debounce('expenses');
  document.getElementById('exp-who').value='';document.getElementById('exp-amount').value='';document.getElementById('exp-desc').value='';
  renderExpenses();
}

function deleteExpense(id){
  const es=getS('expenses');if(!es.list)return;
  es.list=es.list.filter(e=>e.id!==id);debounce('expenses');renderExpenses();
}

function renderExpenses(){
  const es=getS('expenses');const list=es.list||[];
  const el=document.getElementById('exp-list');
  el.innerHTML=list.length?list.map(e=>`
    <div class="exp-item">
      <div class="exp-amt">${Number(e.amount).toFixed(2)} EUR</div>
      <div class="exp-info"><div class="exp-desc-txt">${e.desc}</div><div class="exp-meta">${t('exp_paid_by')}: ${e.paidBy} · ${e.date} · ${t('exp_shared_with')}: ${e.sharedWith.join(', ')}</div></div>
      <span class="exp-del" onclick="deleteExpense(${e.id})">×</span>
    </div>`).join(''):`<div class="exp-empty">${t('exp_empty')}</div>`;
  // Balances
  const paid={},owed={};
  list.forEach(e=>{
    paid[e.paidBy]=(paid[e.paidBy]||0)+(e.amount||0);
    const share=(e.amount||0)/(e.sharedWith.length||1);
    e.sharedWith.forEach(n=>owed[n]=(owed[n]||0)+share);
  });
  const allNames=new Set([...getPartNames(),...Object.keys(paid),...Object.keys(owed)]);
  let html='';
  allNames.forEach(n=>{
    const bal=(paid[n]||0)-(owed[n]||0);
    const cls=bal>0.01?'pos':bal<-0.01?'neg':'zero';
    html+=`<div class="exp-bal-item"><div class="exp-bal-name">${n}</div><div class="exp-bal-val ${cls}">${bal>0.01?'+':''}${bal.toFixed(2)} EUR</div></div>`;
  });
  document.getElementById('exp-balance-grid').innerHTML=html;
  document.getElementById('exp-total-val').textContent=list.reduce((s,e)=>s+(e.amount||0),0).toFixed(2)+' EUR';
}

function updateGlobalProgress(){
  let total=0,done=0;
  rolesData.forEach(r=>{
    const rs=getS(r.id);
    r.tasks.fr.forEach((_,i)=>{total++;if(rs.tasks&&rs.tasks[i])done++;});
    (rs.custom||[]).forEach(t=>{total++;if(t.done)done++;});
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('gp-bar').style.width=pct+'%';
  document.getElementById('gp-pct').textContent=pct+'%';
}

function updateRoleProgress(id,card){
  const r=rolesData.find(x=>x.id===id);const rs=getS(id);
  let total=r.tasks.fr.length+(rs.custom||[]).length,done=0;
  r.tasks.fr.forEach((_,i)=>{if(rs.tasks&&rs.tasks[i])done++;});
  (rs.custom||[]).forEach(t=>{if(t.done)done++;});
  const pct=total?Math.round(done/total*100):0;
  const bar=card.querySelector('.rprog-fill');const txt=card.querySelector('.rprog-txt');
  if(bar)bar.style.width=pct+'%';if(txt)txt.textContent=done+'/'+total+' '+t('tasks_label');
}

// ═══════════════════════════════════════
// TASK LIST
// ═══════════════════════════════════════
function renderTaskList(role,card){
  const rs=getS(role.id);if(!rs.tasks)rs.tasks={};if(!rs.custom)rs.custom=[];
  const body=card.querySelector('.tasks-body');body.innerHTML='';
  const taskList=role.tasks[lang]||role.tasks.fr;
  taskList.forEach((text,i)=>{
    const checked=!!rs.tasks[i];
    const row=document.createElement('div');row.className='task-row';
    row.innerHTML=`<div class="cb${checked?' on':''}"></div><span class="task-lbl${checked?' done':''}">${text}</span>`;
    const toggle=()=>{rs.tasks[i]=!rs.tasks[i];debounce(role.id);renderTaskList(role,card);updateRoleProgress(role.id,card);updateGlobalProgress();};
    row.querySelector('.cb').addEventListener('click',toggle);
    row.querySelector('.task-lbl').addEventListener('click',toggle);
    body.appendChild(row);
  });
  rs.custom.forEach((ct,ci)=>{
    const row=document.createElement('div');row.className='task-row';
    row.innerHTML=`<div class="cb${ct.done?' on':''}"></div><span class="task-lbl${ct.done?' done':''}">${ct.text}</span><span class="task-del">×</span>`;
    const toggle=()=>{rs.custom[ci].done=!rs.custom[ci].done;debounce(role.id);renderTaskList(role,card);updateRoleProgress(role.id,card);updateGlobalProgress();};
    row.querySelector('.cb').addEventListener('click',toggle);row.querySelector('.task-lbl').addEventListener('click',toggle);
    row.querySelector('.task-del').addEventListener('click',()=>{rs.custom.splice(ci,1);debounce(role.id);renderTaskList(role,card);updateRoleProgress(role.id,card);updateGlobalProgress();});
    body.appendChild(row);
  });
  const addRow=document.createElement('div');addRow.className='add-row';
  const inp=document.createElement('input');inp.className='add-input';inp.maxLength=120;inp.placeholder=t('add_task_ph');
  const btn=document.createElement('button');btn.className='add-btn';btn.textContent='+';
  const addTask=()=>{const txt=inp.value.trim();if(!txt)return;rs.custom.push({text:txt,done:false});debounce(role.id);inp.value='';renderTaskList(role,card);updateRoleProgress(role.id,card);updateGlobalProgress();};
  btn.addEventListener('click',addTask);inp.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  addRow.appendChild(inp);addRow.appendChild(btn);body.appendChild(addRow);
}

// ═══════════════════════════════════════
// COMMENTS
// ═══════════════════════════════════════
function buildCommentSection(roleId){
  const ck='comments_'+roleId;
  const section=document.createElement('div');section.className='comments-section';
  section.innerHTML=`
    <div class="comments-toggle">
      <span class="comments-toggle-arrow">▶</span>
      <span class="toggle-label">${t('comments_toggle_show')}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--border)" id="cmt-cnt-${roleId}"></span>
    </div>
    <div class="comments-inner">
      <div class="comment-list"></div>
      <div class="comment-form">
        <input class="comment-author-input" type="text" maxlength="20" placeholder="${t('comments_author')}"/>
        <input class="comment-msg-input" type="text" maxlength="200" placeholder="${t('comments_ph')}"/>
        <button class="comment-send-btn">→</button>
      </div>
    </div>`;
  const toggle=section.querySelector('.comments-toggle');
  const inner=section.querySelector('.comments-inner');
  const arrow=section.querySelector('.comments-toggle-arrow');
  toggle.addEventListener('click',()=>{inner.classList.toggle('open');arrow.classList.toggle('open');toggle.querySelector('.toggle-label').textContent=inner.classList.contains('open')?t('comments_toggle_hide'):t('comments_toggle_show');});
  const authorIn=section.querySelector('.comment-author-input');
  const msgIn=section.querySelector('.comment-msg-input');
  const sendBtn=section.querySelector('.comment-send-btn');
  const send=()=>{
    const author=authorIn.value.trim();const msg=msgIn.value.trim();if(!author||!msg)return;
    const cs=getS(ck);if(!cs.list)cs.list=[];
    const ts=new Date().toLocaleDateString(lang==='fr'?'fr-BE':'en-GB',{day:'2-digit',month:'2-digit'})+' '+new Date().toLocaleTimeString(lang==='fr'?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit'});
    cs.list.push({author,text:msg,ts});msgIn.value='';debounce(ck);
    refreshComments(ck,section);updateCommentCount(roleId);
  };
  sendBtn.addEventListener('click',send);msgIn.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
  refreshComments(ck,section);
  return section;
}

function refreshComments(ck,section){
  const cs=getS(ck);const list=cs.list||[];
  const listEl=section.querySelector('.comment-list');
  listEl.innerHTML=list.length?list.map(c=>`<div class="comment-item"><div class="comment-meta"><span class="comment-author">${c.author}</span><span class="comment-time">${c.ts}</span></div><div class="comment-text">${c.text}</div></div>`).join(''):`<div class="comment-empty">${t('comments_empty')}</div>`;
  listEl.scrollTop=listEl.scrollHeight;
}

function updateCommentCount(roleId){
  const cs=getS('comments_'+roleId);
  const cnt=document.getElementById('cmt-cnt-'+roleId);
  if(cnt)cnt.textContent=cs.list&&cs.list.length?'('+cs.list.length+')':'';
}

// ═══════════════════════════════════════
// ROLE CARDS
// ═══════════════════════════════════════
function buildCard(role){
  const rs=getS(role.id);
  const card=document.createElement('div');card.className='role-card';card.id='card-'+role.id;
  card.style.borderTop='3px solid '+role.color;
  const title=typeof role.title==='object'?role.title[lang]:role.title;
  const nameVal=rs.name||role.defaultName||'';
  // Special badge for media role
  const mediaBadge=role.id==='media'?`<div class="media-badge">${lang==='fr'?'🎥 DOCUMENTAIRE':'🎥 DOCUMENTARY'}</div>`:'';
  card.innerHTML=`
    <div class="role-top">
      <div class="role-hrow">
        <span class="role-icon">${role.icon}</span>
        <div class="role-info">
          <div class="role-title">${title}</div>
          ${mediaBadge}
          <div class="name-row"><input class="name-input" type="text" maxlength="30" value="${nameVal}" placeholder="${t('name_ph')}"/><span style="font-size:11px;color:var(--muted)">✏️</span></div>
        </div>
      </div>
    </div>
    <div class="role-prog"><div class="rprog-row"><div class="rprog-bg"><div class="rprog-fill" style="width:0%"></div></div><span class="rprog-txt">0/0</span></div></div>
    ${role.hasCities?`
    <div class="transport-cities">
      <div class="city-card"><div class="city-from">🇧🇪 ${lang==='fr'?'Bruxelles':'Brussels'}</div><div class="city-detail">BRU → TRN direct ${lang==='fr'?'ou':'or'} BRU → GVA + train</div><div class="city-price">~60–100 EUR</div></div>
      <div class="city-card"><div class="city-from">🇫🇷 Paris</div><div class="city-detail">CDG/ORY → TRN ${lang==='fr'?'ou TGV (~5h)':'or TGV (~5h)'}</div><div class="city-price">~50–90 EUR</div></div>
      <div class="city-card"><div class="city-from">🇨🇭 ${lang==='fr'?'Bâle':'Basel'}</div><div class="city-detail">BSL → TRN ${lang==='fr'?'ou train via Genève':'or train via Geneva'}</div><div class="city-price">~80–120 EUR</div></div>
      <div class="city-card"><div class="city-from">🇲🇦 ${lang==='fr'?'Maroc':'Morocco'}</div><div class="city-detail">CMN/RAK ${lang==='fr'?'via Paris ou Madrid':'via Paris or Madrid'}</div><div class="city-price">~150–250 EUR</div></div>
    </div>`:''}
    <div class="tasks-body"></div>`;
  card.querySelector('.name-input').addEventListener('change',e=>{getS(role.id).name=e.target.value.trim();debounce(role.id);});
  card.appendChild(buildCommentSection(role.id));
  renderTaskList(role,card);updateRoleProgress(role.id,card);
  return card;
}

function renderAll(){
  const grid=document.getElementById('roles-grid');grid.innerHTML='';
  rolesData.forEach(r=>grid.appendChild(buildCard(r)));
  updateGlobalProgress();
  rolesData.forEach(r=>updateCommentCount(r.id));
  applyTranslations();
}

function applyTranslations(){
  document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.getAttribute('data-t')));
  document.getElementById('btn-fr').className='lang-opt'+(lang==='fr'?' active':'');
  document.getElementById('btn-en').className='lang-opt'+(lang==='en'?' active':'');
  document.documentElement.lang=lang;
}

// ═══════════════════════════════════════
// REALTIME
// ═══════════════════════════════════════
function subscribeRealtime(){
  db.channel('trek-live-v3').on('postgres_changes',{event:'*',schema:'public',table:'trek_state'},payload=>{
    const{key,value}=payload.new||{};if(!key||!value)return;
    state[key]=value;
    if(key.startsWith('comments_')){
      const roleId=key.replace('comments_','');
      const card=document.getElementById('card-'+roleId);
      if(card){const section=card.querySelector('.comments-section');if(section)refreshComments(key,section);}
      updateCommentCount(roleId);
    }else if(key==='participants'){renderParticipants();updateExpenseCheckboxes();}
    else if(key==='expenses'){renderExpenses();}
    else{
      const card=document.getElementById('card-'+key);
      if(card){const role=rolesData.find(r=>r.id===key);if(role){renderTaskList(role,card);updateRoleProgress(key,card);}}
      updateGlobalProgress();
    }
    const time=new Date().toLocaleTimeString(lang==='fr'?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit'});
    syncMsg.textContent=t('sync_updated')+' · '+time;
  }).subscribe(s=>{if(s==='SUBSCRIBED'){syncDot.className='connected';setSyncMsg('sync_connected');}});
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init(){
  applyTranslations();renderInfoGrid();renderHub();initCountdown();initMap();
  updateExpenseCheckboxes();
  loadState().then(()=>subscribeRealtime());
}
init();
</script>
