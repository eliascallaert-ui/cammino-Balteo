<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan B 15/10 — Cammino Balteo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0f1923; --surface:#162030; --surface2:#1c2d40; --border:#243548;
  --text:#d0dbe8; --muted:#6b8099; --white:#fff; --blue:#2979ff;
  --green:#43a047; --orange:#f57c00; --purple:#7b1fa2; --red:#e53935;
  --teal:#00838f; --gold:#f9a825; --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Segoe UI',system-ui,Arial,sans-serif;color:var(--text);font-size:15px;line-height:1.6;}

/* ── LANG TOGGLE ── */
#lang-btn{position:fixed;top:12px;right:16px;z-index:10000;display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:4px 6px;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.lang-opt{padding:5px 12px;border-radius:24px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.2s;letter-spacing:0.5px;user-select:none;}
.lang-opt.active{background:var(--blue);color:white;box-shadow:0 2px 8px rgba(41,121,255,0.4);}

/* ── SYNC BAR ── */
#sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);padding-right:120px;}
#sync-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0;transition:background 0.3s;}
#sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
#sync-dot.saving{background:var(--orange);}

/* ── HERO ── */
.hero{background:linear-gradient(160deg,#0a1520 0%,#142a4a 55%,#0a2010 100%);padding:36px 20px 28px;text-align:center;border-bottom:1px solid var(--border);}
.hero-flags{font-size:26px;letter-spacing:8px;margin-bottom:12px;}
.hero h1{font-size:36px;color:var(--white);letter-spacing:5px;font-weight:900;}
.hero-tagline{color:#90b8e0;font-size:14px;margin-top:8px;}
.hero-date{display:inline-block;background:var(--blue);color:white;font-size:13px;font-weight:700;padding:6px 20px;border-radius:30px;margin-top:14px;}

/* ── GLOBAL PROGRESS ── */
.gp-wrap{background:var(--surface);padding:14px 20px;border-bottom:1px solid var(--border);}
.gp-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.gp-label{font-size:12px;color:var(--muted);white-space:nowrap;}
.gp-bar-bg{flex:1;background:var(--bg);border-radius:10px;height:8px;overflow:hidden;}
.gp-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:10px;transition:width .5s ease;}
#gp-pct{font-size:13px;font-weight:700;color:var(--white);white-space:nowrap;}

.container{max-width:960px;margin:0 auto;padding:28px 20px;}

/* ── SECTION HEADERS ── */
.sec-head{margin:36px 0 18px;display:flex;align-items:center;gap:14px;}
.sec-head h2{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-sub{font-size:13px;color:var(--muted);margin:-10px 0 18px;}
.sec-sub strong{color:#ef9a9a;}

/* ── MAP ── */
.map-wrap{background:linear-gradient(170deg,#1a3a60 0%,#1e3a50 50%,#1a3020 100%);border-radius:var(--radius);padding:24px;overflow:hidden;position:relative;min-height:240px;border:1px solid var(--border);}
svg.bg-svg{position:absolute;inset:0;width:100%;height:100%;}
.stages-row{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:50px 8px 30px;}
.stage-pin{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;}
.stage-dot{width:20px;height:20px;border-radius:50%;border:3px solid rgba(255,255,255,.9);box-shadow:0 2px 12px rgba(0,0,0,.5);transition:transform .2s,box-shadow .2s;margin:6px 0;flex-shrink:0;}
.stage-pin:hover .stage-dot{transform:scale(1.5);box-shadow:0 4px 18px rgba(0,0,0,.6);}
.stage-tag{font-size:9px;background:rgba(0,0,0,.65);color:white;border-radius:5px;padding:2px 6px;font-weight:700;}
.stage-lbl{font-size:9px;font-weight:700;color:white;text-align:center;margin-top:4px;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,1);max-width:72px;}
.stage-km{font-size:8px;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;}
.trail{position:absolute;top:50%;left:24px;right:24px;height:2px;background:repeating-linear-gradient(90deg,#ef5350 0,#ef5350 8px,transparent 8px,transparent 14px);z-index:1;transform:translateY(-50%);}

/* ── TOOLTIP ── */
.tip{display:none;position:fixed;background:#08141f;border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 10px 30px rgba(0,0,0,.7);font-size:13px;z-index:9999;min-width:220px;max-width:270px;pointer-events:none;}
.tip.show{display:block;}
.tip-title{font-weight:700;color:#90caf9;font-size:14px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.tip-row{color:#90a4ae;line-height:2;}
.tip-row b{color:var(--white);}
.tip-note{margin-top:8px;color:#64b5f6;font-size:12px;line-height:1.5;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px;}
.stat{background:var(--surface);border-radius:12px;padding:16px 12px;text-align:center;border:1px solid var(--border);}
.stat-val{font-size:22px;font-weight:800;color:var(--white);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

/* ── ROLE CARDS ── */
.roles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.role-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;}
.role-top{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.role-hrow{display:flex;align-items:flex-start;gap:12px;}
.role-icon{font-size:24px;flex-shrink:0;margin-top:2px;}
.role-info{flex:1;min-width:0;}
.role-title{color:var(--white);font-weight:700;font-size:15px;}
.name-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.name-input{font-size:13px;color:#90caf9;font-weight:600;border:none;background:transparent;outline:none;font-family:inherit;width:100%;cursor:pointer;}
.name-input:focus{color:var(--white);border-bottom:1px dashed var(--blue);cursor:text;}
.edit-hint{font-size:11px;color:var(--muted);cursor:pointer;flex-shrink:0;}

/* PROGRESS BAR */
.role-prog{padding:10px 20px 0;}
.rprog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rprog-bg{flex:1;background:var(--bg);border-radius:8px;height:5px;overflow:hidden;}
.rprog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:8px;transition:width .4s;}
.rprog-txt{font-size:11px;color:var(--muted);white-space:nowrap;}

/* TASKS */
.tasks-body{padding:4px 20px 16px;flex:1;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(36,53,72,.5);}
.task-row:last-of-type{border-bottom:none;}
.cb{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;}
.cb.on{background:var(--blue);border-color:var(--blue);}
.cb.on::after{content:'✓';font-size:11px;color:white;font-weight:700;}
.task-lbl{font-size:13px;color:var(--text);line-height:1.5;flex:1;cursor:pointer;transition:color .2s;}
.task-lbl.done{text-decoration:line-through;color:var(--muted);}
.task-del{font-size:18px;color:var(--border);cursor:pointer;flex-shrink:0;line-height:1;opacity:0;transition:opacity .2s,color .2s;padding:0 2px;}
.task-row:hover .task-del{opacity:1;}
.task-del:hover{color:#ef5350;}

/* ADD TASK */
.add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--white);outline:none;font-family:inherit;}
.add-input:focus{border-color:var(--blue);}
.add-btn{background:var(--blue);border:none;border-radius:8px;color:white;font-size:20px;width:36px;cursor:pointer;transition:background .2s;}
.add-btn:hover{background:#448aff;}

/* TRANSPORT */
.transport-cities{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);}
.city-card{background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);}
.city-from{font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px;}
.city-detail{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.city-price{font-size:12px;color:#80cbc4;font-weight:700;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.info-card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border);}
.info-card h4{color:var(--white);font-size:14px;font-weight:700;margin-bottom:12px;}
.info-card li{font-size:13px;color:var(--muted);line-height:1.9;list-style:none;padding-left:14px;position:relative;}
.info-card li::before{content:'›';position:absolute;left:0;color:var(--border);}
.info-card li b{color:var(--text);}
.info-card a{color:#90caf9;text-decoration:none;}
.info-card a:hover{text-decoration:underline;}
.sos{border-left:3px solid #c62828!important;}
.sos h4{color:#ef9a9a;}

/* BUDGET */
.budget-box{background:var(--surface);border-radius:var(--radius);padding:24px;border:1px solid var(--border);}
.budget-box h3{color:var(--white);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:18px;}
.budget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.budget-item{background:var(--surface2);border-radius:10px;padding:12px 10px;text-align:center;border:1px solid var(--border);}
.budget-item span{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
.budget-item strong{font-size:15px;color:var(--white);}
.budget-item.tot{background:#0d2040;border-color:var(--blue);}
.budget-item.tot strong{color:#90caf9;font-size:18px;}
.budget-item.tot2{background:#0d2010;border-color:#2e7d32;}
.budget-item.tot2 strong{color:#a5d6a7;font-size:18px;}
.budget-note{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6;}

footer{text-align:center;padding:24px;font-size:12px;color:var(--border);border-top:1px solid var(--surface);margin-top:8px;}
footer a{color:var(--muted);}

@media(max-width:680px){
  .roles-grid,.info-grid{grid-template-columns:1fr;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .budget-grid{grid-template-columns:repeat(2,1fr);}
  .transport-cities{grid-template-columns:1fr;}
  .hero h1{font-size:24px;}
  .stage-km,.stage-lbl{display:none;}
  #lang-btn{top:8px;right:8px;}
}
</style>
</head>
<body>

};

let lang = localStorage.getItem('balteo_lang') || 'fr';

function t(key) { return T[lang][key] || T.fr[key] || key; }

function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    el.textContent = t(key);
  });
  document.getElementById('btn-fr').className = 'lang-opt' + (lang === 'fr' ? ' active' : '');
  document.getElementById('btn-en').className = 'lang-opt' + (lang === 'en' ? ' active' : '');
  document.documentElement.lang = lang;
  // Update dynamic placeholders
  document.querySelectorAll('.name-input').forEach(el => { if (!el.value) el.placeholder = t('name_placeholder'); });
  document.querySelectorAll('.add-input').forEach(el => { el.placeholder = t('add_task_placeholder'); });
  // Re-render info grid and roles for translated content
  renderInfoGrid();
  renderAll();
}

function setLang(l) {
  lang = l;
  localStorage.setItem('balteo_lang', l);
  applyLang();
}

function setSyncMsg(key, extra) { syncMsg.textContent = t(key) + (extra ? ' · ' + extra : ''); }

async function loadState() {
  setSyncMsg('sync_connecting');
  try {
    const { data, error } = await db.from('trek_state').select('*');
    if (error) throw error;
    data.forEach(r => { state[r.key] = r.value; });
    syncDot.className = 'connected';
    setSyncMsg('sync_connected');
  } catch(e) {
    syncDot.className = '';
    setSyncMsg('sync_offline');
    try { state = JSON.parse(localStorage.getItem('balteo_v3') || '{}'); } catch(_) {}
  }
  renderAll();
}

async function saveRole(id) {
  const val = state[id] || {};
  try {
    localStorage.setItem('balteo_v3', JSON.stringify(state));
    syncDot.className = 'saving';
    setSyncMsg('sync_saving');
    const { error } = await db.from('trek_state').upsert({ key:id, value:val, updated_at: new Date().toISOString() });
    if (error) throw error;
    syncDot.className = 'connected';
    const time = new Date().toLocaleTimeString(lang === 'fr' ? 'fr-FR' : 'en-GB', {hour:'2-digit',minute:'2-digit'});
    syncMsg.textContent = t('sync_saved') + ' · ' + time;
  } catch(e) {
    syncDot.className = '';
    setSyncMsg('sync_offline');
  }
}

function debounceSave(id) { clearTimeout(saveTimer[id]); saveTimer[id] = setTimeout(() => saveRole(id), 600); }
function getRoleState(id) { if (!state[id]) state[id] = {name:'',tasks:{},custom:[]}; if (!state[id].custom) state[id].custom=[]; return state[id]; }

const tip = document.getElementById('tip');
function buildMap() {
  const row = document.getElementById('stages-row');
  row.innerHTML = '';
  stagesData.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stage-pin';
    const km = typeof s.km === 'object' ? s.km[lang] : s.km;
    el.innerHTML = `<div class="stage-tag">${s.day}</div><div class="stage-dot" style="background:${s.color}"></div><div class="stage-lbl">${s.name}</div><div class="stage-km">${km}</div>`;
    el.addEventListener('mouseenter', () => {
      const d = s.d;
      const dist = typeof d.dist === 'object' ? d.dist[lang] : d.dist;
      const dur = typeof d.dur === 'object' ? d.dur[lang] : d.dur;
      const note = typeof d.note === 'object' ? d.note[lang] : d.note;
      document.getElementById('tip-title').textContent = s.day + ' — ' + s.name;
      document.getElementById('tip-body').innerHTML =
        `<div class="tip-row">${t('tip_dist')} : <b>${dist}</b></div>` +
        `<div class="tip-row">${t('tip_dur')} : <b>${dur}</b></div>` +
        `<div class="tip-row">${t('tip_alt')} : <b>${d.alt}</b></div>` +
        `<div class="tip-note">${note}</div>`;
      const r = el.getBoundingClientRect();
      let left = r.left + r.width/2 - 110;
      left = Math.max(8, Math.min(left, window.innerWidth - 280));
      tip.style.left = left+'px'; tip.style.top = (r.bottom+8)+'px';
      tip.classList.add('show');
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('show'));
    el.addEventListener('touchstart', e => { e.preventDefault(); el.dispatchEvent(new MouseEvent('mouseenter')); setTimeout(()=>tip.classList.remove('show'),3000); });
    row.appendChild(el);
  });
}

// PROGRESS
// ══════════════════════════════════════════
function updateGlobalProgress() {
  let total=0, done=0;
  rolesData.forEach(r => {
    const rs = getRoleState(r.id);
    r.tasks.fr.forEach((_,i) => { total++; if(rs.tasks[i]) done++; });
    rs.custom.forEach(t => { total++; if(t.done) done++; });
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('gp-bar').style.width = pct+'%';
  document.getElementById('gp-pct').textContent = pct+'%';
}

function updateRoleProgress(id, card) {
  const r = rolesData.find(x=>x.id===id);
  const rs = getRoleState(id);
  let total = r.tasks.fr.length + rs.custom.length, done=0;
  r.tasks.fr.forEach((_,i) => { if(rs.tasks[i]) done++; });
  rs.custom.forEach(t => { if(t.done) done++; });
  const pct = total ? Math.round(done/total*100) : 0;
  const bar = card.querySelector('.rprog-fill');
  const txt = card.querySelector('.rprog-txt');
  if(bar) bar.style.width = pct+'%';
  if(txt) txt.textContent = done+'/'+total+' '+t('tasks_label');
}

// RENDER TASKS
// ══════════════════════════════════════════
function renderTaskList(role, card) {
  const rs = getRoleState(role.id);
  const body = card.querySelector('.tasks-body');
  body.innerHTML = '';
  const taskList = role.tasks[lang] || role.tasks.fr;

  taskList.forEach((text, i) => {
    const checked = !!rs.tasks[i];
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `<div class="cb${checked?' on':''}"></div><span class="task-lbl${checked?' done':''}">${text}</span>`;
    const toggle = () => { rs.tasks[i]=!rs.tasks[i]; debounceSave(role.id); renderTaskList(role,card); updateRoleProgress(role.id,card); updateGlobalProgress(); };
    row.querySelector('.cb').addEventListener('click', toggle);
    row.querySelector('.task-lbl').addEventListener('click', toggle);
    body.appendChild(row);
  });

  rs.custom.forEach((ct, ci) => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `<div class="cb${ct.done?' on':''}"></div><span class="task-lbl${ct.done?' done':''}">${ct.text}</span><span class="task-del">×</span>`;
    const toggle = () => { rs.custom[ci].done=!rs.custom[ci].done; debounceSave(role.id); renderTaskList(role,card); updateRoleProgress(role.id,card); updateGlobalProgress(); };
    row.querySelector('.cb').addEventListener('click', toggle);
    row.querySelector('.task-lbl').addEventListener('click', toggle);
    row.querySelector('.task-del').addEventListener('click', () => { rs.custom.splice(ci,1); debounceSave(role.id); renderTaskList(role,card); updateRoleProgress(role.id,card); updateGlobalProgress(); });
    body.appendChild(row);
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  const inp = document.createElement('input');
  inp.className = 'add-input'; inp.maxLength = 120;
  inp.placeholder = t('add_task_placeholder');
  const btn = document.createElement('button');
  btn.className = 'add-btn'; btn.textContent = '+';
  const addTask = () => {
    const txt = inp.value.trim(); if(!txt) return;
    rs.custom.push({text:txt,done:false}); debounceSave(role.id);
    inp.value = ''; renderTaskList(role,card); updateRoleProgress(role.id,card); updateGlobalProgress();
  };
  btn.addEventListener('click', addTask);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  addRow.appendChild(inp); addRow.appendChild(btn);
  body.appendChild(addRow);
}

      <div class="city-card"><div class="city-from">🇧🇪 ${lang==='fr'?'Bruxelles':'Brussels'}</div><div class="city-detail">${lang==='fr'?'BRU → TRN direct ou BRU → GVA + train (~3h30)':'BRU → TRN direct or BRU → GVA + train (~3h30)'}</div><div class="city-price">~60–100 EUR A/R</div></div>
      <div class="city-card"><div class="city-from">🇫🇷 Paris</div><div class="city-detail">${lang==='fr'?'CDG/ORY → TRN (EasyJet) ou TGV Paris→Turin (~5h)':'CDG/ORY → TRN (EasyJet) or TGV Paris→Turin (~5h)'}</div><div class="city-price">~50–90 EUR A/R</div></div>
      <div class="city-card"><div class="city-from">🇨🇭 ${lang==='fr'?'Bale':'Basel'}</div><div class="city-detail">${lang==='fr'?'BSL → TRN ou train Basel→Geneve puis Turin':'BSL → TRN or train Basel→Geneva then Turin'}</div><div class="city-price">~80–120 EUR A/R</div></div>
      <div class="city-card"><div class="city-from">🇲🇦 ${lang==='fr'?'Maroc':'Morocco'}</div><div class="city-detail">${lang==='fr'?'CMN/RAK via Paris ou Madrid. Prevoir escale. Arrivee Turin avant 16h.':'CMN/RAK via Paris or Madrid. Allow for layover. Arrive Turin before 4pm.'}</div><div class="city-price">~150–250 EUR A/R</div></div>
    </div>` : ''}
    <div class="tasks-body"></div>
  `;

  card.querySelector('.name-input').addEventListener('change', e => {
    getRoleState(role.id).name = e.target.value.trim();
    debounceSave(role.id);
  });

  renderTaskList(role, card);
  updateRoleProgress(role.id, card);
  return card;
}

function renderAll() {
  const grid = document.getElementById('roles-grid');
  grid.innerHTML = '';
  rolesData.forEach(r => grid.appendChild(buildCard(r)));
  updateGlobalProgress();
  buildMap();
  applyTranslations();
}

function applyTranslations() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    el.textContent = t(key);
  });
  document.getElementById('btn-fr').className = 'lang-opt'+(lang==='fr'?' active':'');
  document.getElementById('btn-en').className = 'lang-opt'+(lang==='en'?' active':'');
  document.documentElement.lang = lang;
}

// ══════════════════════════════════════════
// REALTIME
// ══════════════════════════════════════════
function subscribeRealtime() {
  db.channel('trek-live')
    .on('postgres_changes', {event:'*',schema:'public',table:'trek_state'}, payload => {
      const { key, value } = payload.new || {};
      if(!key||!value) return;
      state[key] = value;
      const card = document.getElementById('card-'+key);
      if(card) {
        const role = rolesData.find(r=>r.id===key);
        if(role) {
          const ni = card.querySelector('.name-input');
          if(ni && document.activeElement!==ni) ni.value = getRoleState(key).name || role.defaultName || '';
          renderTaskList(role, card);
          updateRoleProgress(key, card);
        }
      }
      updateGlobalProgress();
      const time = new Date().toLocaleTimeString(lang==='fr'?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit'});
      syncMsg.textContent = t('sync_updated')+' · '+time;
    })
    .subscribe(s => {
      if(s==='SUBSCRIBED') { syncDot.className='connected'; setSyncMsg('sync_connected'); }
    });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderInfoGrid();
applyTranslations();
loadState().then(() => subscribeRealtime());
</script>
</body>
